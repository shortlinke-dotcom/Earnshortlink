<style>
*{
margin:0;
padding:0;

body{
background:#050816;

/* BACKGROUND */
.stars{
position:fixed;
inset:0;

radial-gradient(2px 2px at 20px 20px,#fff,transparent),
radial-gradient(2px 2px at 120px 120px,#00eaff,transparent);

radial-gradient(circle at 20% 20%,rgba(0,234,255,.12),transparent 30%);

backdrop-filter:blur(15px);

}
.brand{
font-size:22px;
font-weight:700;
color:#00eaff;
}
.menu{

}

}
.auth-buttons{

gap:10px;
}
.login-btn{
padding:8px 18px;
border:1px solid #00eaff;
border-radius:50px;
color:#00eaff;
text-decoration:none;
}
.register-btn{
padding:8px 18px;
background:#00eaff;
border-radius:50px;
color:#000;
font-weight:600;
text-decoration:none;
}
/* HERO */
.hero{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
min-height:100vh;
padding:160px 20px 80px;
}
.hero h1{
font-size:clamp(3rem,10vw,6rem);
font-weight:800;
color:#00eaff;
text-shadow:0 0 30px #00eaff;
}
.subtitle{
margin-top:10px;
font-size:18px;
max-width:600px;
}
.hero-buttons{
margin-top:30px;
display:flex;
gap:15px;

}
.btn{
padding:12px 25px;
border-radius:50px;
font-weight:600;
text-decoration:none;
}
.btn-primary{
background:#00eaff;
color:#000;
}
.btn-secondary{
border:1px solid #00eaff;

}
/* CARD */
.section{
padding:70px 20px;
text-align:center;
}
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}
.card{
width:260px;
padding:20px;
background:rgba(255,255,255,.05);
border-radius:15px;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(0,234,255,.2);
}
/* STATS */
.stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:50px auto;
}
.stat-box{
width:200px;
padding:20px;
background:rgba(255,255,255,.05);
border-radius:15px;
}
.stat-box h3{
color:#00eaff;
}
/* FOOTER */
footer{
text-align:center;
padding:20px;
border-top:1px solid rgba(255,255,255,.1);
}
/* MOBILE */
@media(max-width:768px){
.menu{
display:none;
}
.navbar{
flex-direction:column;
gap:10px;
}
.hero{
padding-top:200px;

}

</div>

© 2026 EARNSHORTLINK
</footer>
<script>
function animateValue(id,start,end,duration){
let obj=document.getElementById(id);
if(!obj) return;
let range=end-start;
let current=start;
let increment=end>start?1:-1;
let stepTime=Math.abs(Math.floor(duration/range));
let timer=setInterval(function(){
current+=increment;
obj.textContent=current.toLocaleString()+"+";
if(current==end){
clearInterval(timer);
}
},stepTime);
}
animateValue("users",0,12547,1500);
animateValue("withdraw",0,8932,1500);
</script>
