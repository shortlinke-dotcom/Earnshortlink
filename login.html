<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk - EarnShortlink</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
background:#020817;
color:#fff;
overflow-x:hidden;
}
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564');
background-size:cover;
background-position:center;
z-index:-1;
}
.login-section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}
.login-card{
width:100%;
max-width:550px;
padding:35px;
border-radius:25px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(15px);
border:1px solid #2196f3;
box-shadow:
0 0 20px rgba(33,150,243,.35),
0 0 40px rgba(33,150,243,.15);
}
.login-header{
text-align:center;
margin-bottom:30px;
}
.login-header h1{
font-size:48px;
font-weight:800;
margin-bottom:10px;
}
.login-header h1 span{
color:#2196f3;
}
.login-header p{
color:#cbd5e1;
}
.form-group{
margin-bottom:18px;
}
.form-group input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
color:#fff;
font-size:15px;
outline:none;
transition:.3s;
}
.form-group input:focus{
border-color:#2196f3;
box-shadow:0 0 15px rgba(33,150,243,.5);
}
.form-group input::placeholder{
color:#cbd5e1;
}
.forgot-password{
text-align:right;
margin-top:-5px;
margin-bottom:15px;
}
.forgot-password a{
color:#2196f3;
text-decoration:none;
font-size:13px;
}
.remember-box{
display:flex;
gap:10px;
align-items:center;
margin-bottom:20px;
font-size:14px;
color:#d1d5db;
}
.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#2196f3;
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}
.login-btn:hover{
transform:translateY(-2px);
box-shadow:
0 0 15px rgba(33,150,243,.6),
0 0 30px rgba(33,150,243,.4);
}
.register-link{
text-align:center;
margin-top:20px;
color:#d1d5db;
}
.register-link a{
color:#2196f3;
text-decoration:none;
font-weight:700;
}
/* TABLET */
@media(max-width:768px){
.login-card{
padding:25px;
}
.login-header h1{
font-size:36px;
}
}
/* MOBILE */
@media(max-width:480px){
.login-section{
padding:15px;
}
.login-card{
padding:20px;
border-radius:20px;
}
.login-header h1{
font-size:30px;
}
.login-header p{
font-size:13px;
}
.form-group input{
padding:13px;
font-size:14px;
}
.login-btn{
padding:14px;
font-size:15px;
}
}
</style>
</head>
<body>
<div class="bg"></div>
<section class="login-section">
<div class="login-card">
<div class="login-header">
<h1>EARN<span>SHORTLINK</span></h1>
<p>Masuk ke akun Anda dan mulai menghasilkan saldo.</p>
</div>
<form>
<div class="form-group">
<input type="text" placeholder="Gmail atau Nama Akun" required>
</div>
<div class="form-group">
<input type="password" placeholder="Kata Sandi" required>
</div>
<div class="forgot-password">
<a href="#">Lupa Kata Sandi?</a>
</div>
<div class="remember-box">
<input type="checkbox" id="remember">
<label for="remember">Ingatkan Saya</label>
</div>
<button type="submit" class="login-btn">
Masuk
</button>
</form>
<div class="register-link">
Belum punya akun?
<a href="register.html">Daftar Sekarang</a>
</div>
</div>
</section>
</body>
</html>
