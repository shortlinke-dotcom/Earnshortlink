<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020817;
color:#fff;
overflow-x:hidden;
}

/* BACKGROUND (SAMA LOGIN) */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564');
background-size:cover;
background-position:center;
z-index:-1;
}

/* SECTION */
.register-section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* CARD (SAMA LOGIN) */
.register-card{
width:100%;
max-width:600px;
padding:40px;
border-radius:25px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(15px);
border:1px solid rgba(33,150,243,.4);
box-shadow:
0 0 25px rgba(33,150,243,.3),
0 0 60px rgba(33,150,243,.1);
}

/* HEADER (SAMA LOGIN) */
.register-header{
text-align:center;
margin-bottom:30px;
}

.register-header h1{
font-size:52px;
font-weight:800;
}

.register-header span{
color:#2196f3;
}

.register-header p{
margin-top:10px;
color:#cbd5e1;
}

/* INPUT */
.form-group{
margin-bottom:18px;
}

.form-group input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
color:#fff;
font-size:15px;
transition:.3s;
}

.form-group input:focus{
border-color:#2196f3;
box-shadow:0 0 15px rgba(33,150,243,.5);
}

.form-group input::placeholder{
color:#94a3b8;
}

/* PASSWORD */
.password-wrapper{
position:relative;
}

.password-wrapper input{
padding-right:45px;
}

.toggle-eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#94a3b8;
transition:.2s;
}

.toggle-eye:hover{
color:#2196f3;
}

/* CHECKBOX */
.check{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
color:#cbd5e1;
margin-bottom:20px;
}

.check a{
color:#2196f3;
text-decoration:none;
}

/* BUTTON (SAMA LOGIN) */
.register-btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#2196f3;
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.register-btn:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(33,150,243,.6);
}

/* FOOTER */
.login-link{
margin-top:20px;
text-align:center;
color:#cbd5e1;
}

.login-link a{
color:#2196f3;
font-weight:700;
text-decoration:none;
}

/* ALERT */
.alert{
background:#ef4444;
color:#fff;
padding:14px;
border-radius:12px;
margin-bottom:18px;
text-align:center;
font-weight:600;
}

/* ===================== */
/* RESPONSIVE (SAMA LOGIN) */
/* ===================== */
@media(max-width:768px){

.register-section{
padding:0;
}

.register-card{
width:100%;
max-width:100%;
min-height:100vh;
border-radius:0;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
}

.register-header h1{
font-size:34px;
}

.register-header p{
font-size:14px;
}

.form-group input{
padding:15px;
font-size:14px;
}

.register-btn{
padding:15px;
font-size:15px;
}
}

@media(max-width:480px){
.register-header h1{
font-size:30px;
}
}
.divider{
display:flex;
align-items:center;
margin:22px 0;
color:#94a3b8;
font-size:13px;
}

.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:rgba(255,255,255,.12);
}

.divider span{
padding:0 15px;
}

.social-btn{
width:100%;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:15px;
margin-bottom:12px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:.25s;
}

.google{
background:#fff;
color:#222;
}

.google:hover{
background:#f5f5f5;
}

</style>
</head>

<body>

<div class="bg"></div>

<section class="register-section">

<div class="register-card">

<div class="register-header">
<h1>EARN<span>SHORTLINK</span></h1>
<p>Buat akun dan mulai menghasilkan saldo</p>
</div>

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form action="/register" method="POST">

<div class="form-group">
<input type="email" name="gmail" placeholder="Gmail" required>
</div>

<div class="form-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="form-group password-wrapper">
<input type="password" id="password" name="password" placeholder="Password" required>
<i class="fa-solid fa-eye toggle-eye" onclick="togglePassword('password', this)"></i>
</div>

<div class="form-group password-wrapper">
<input type="password" id="confirm_password" name="confirm_password" placeholder="Konfirmasi Password" required>
<i class="fa-solid fa-eye toggle-eye" onclick="togglePassword('confirm_password', this)"></i>
</div>

<div class="check">
<input type="checkbox" required>
<label>Saya menyetujui <a href="#">Privacy</a> & <a href="#">Terms</a></label>
</div>

<button type="submit" class="register-btn">Daftar</button>

</form>
<div class="divider">
    <span>atau lanjutkan dengan</span>
</div>

<a href="/auth/google" class="social-btn google">
    <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 19 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.3l-6.2-5.2c-2.1 1.6-4.7 2.5-7.3 2.5-5.3 0-9.8-3.3-11.3-8l-6.6 5.1C9.7 39.5 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6 7.1l6.2 5.2C39.5 36.7 44 31 44 24c0-1.3-.1-2.3-.4-3.5z"/>
    </svg>
    Daftar dengan Google
</a>

<div class="login-link">
Sudah punya akun? <a href="/login">Masuk</a>
</div>

</div>

</section>

<script>
function togglePassword(id, el){
const input = document.getElementById(id);
const show = input.type === "password";

input.type = show ? "text" : "password";
el.classList.toggle("fa-eye");
el.classList.toggle("fa-eye-slash");
}
</script>

</body>
</html>
