<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top, #0b1b33, #050814);
color:#fff;
padding:20px;
}

/* CARD */
.card{
width:100%;
max-width:480px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 25px 70px rgba(0,0,0,0.6);
}

/* HEADER */
.header{
text-align:center;
margin-bottom:28px;
}

.header h1{
font-size:30px;
font-weight:700;
letter-spacing:1px;
}

.header span{
color:#4da3ff;
}

.header p{
font-size:13px;
color:#aab4c0;
margin-top:8px;
}

/* INPUT GROUP */
.group{
margin-bottom:14px;
}

input{
width:100%;
padding:14px 15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.04);
color:#fff;
outline:none;
font-size:14px;
transition:.2s;
}

input:focus{
border-color:#4da3ff;
box-shadow:0 0 0 3px rgba(77,163,255,0.15);
}

input::placeholder{
color:#8fa3b8;
}

/* PASSWORD */
.password{
position:relative;
}

.password input{
padding-right:45px;
}

.toggle{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#8fa3b8;
transition:.2s;
}

.toggle:hover{
color:#4da3ff;
}

/* CHECKBOX */
.check{
display:flex;
align-items:flex-start;
gap:10px;
font-size:12px;
color:#aab4c0;
margin:12px 0 18px;
line-height:1.4;
}

.check a{
color:#4da3ff;
text-decoration:none;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4da3ff,#2b7cff);
color:#fff;
font-weight:600;
cursor:pointer;
transition:.2s;
font-size:14px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(77,163,255,0.35);
}

/* FOOTER */
.footer{
text-align:center;
margin-top:18px;
font-size:13px;
color:#aab4c0;
}

.footer a{
color:#4da3ff;
text-decoration:none;
font-weight:600;
}

/* ALERT */
.alert{
background:rgba(255,70,70,0.12);
border:1px solid rgba(255,70,70,0.25);
padding:12px;
border-radius:12px;
font-size:13px;
margin-bottom:15px;
text-align:center;
}

/* ===================== */
/* RESPONSIVE MOBILE     */
/* ===================== */
@media(max-width:768px){

body{
padding:0;
align-items:stretch;
}

.card{
width:100%;
max-width:100%;
min-height:100vh;
border-radius:0;
padding:28px 22px;
display:flex;
flex-direction:column;
justify-content:center;
}

.header h1{
font-size:26px;
}

input{
padding:13px;
font-size:14px;
}

button{
padding:13px;
}

}

/* SMALL PHONE */
@media(max-width:420px){
.header h1{
font-size:24px;
}
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<h1>EARN<span>SHORTLINK</span></h1>
<p>Buat akun dan mulai menghasilkan uang dengan sistem modern</p>
</div>

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form action="/register" method="POST">

<div class="group">
<input type="email" name="gmail" placeholder="Email" required>
</div>

<div class="group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="group password">
<input type="password" id="password" name="password" placeholder="Password" required>
<i class="fa-solid fa-eye toggle" onclick="togglePassword('password', this)"></i>
</div>

<div class="group password">
<input type="password" id="confirm_password" name="confirm_password" placeholder="Konfirmasi Password" required>
<i class="fa-solid fa-eye toggle" onclick="togglePassword('confirm_password', this)"></i>
</div>

<div class="check">
<input type="checkbox" required>
<label>
Saya menyetujui <a href="#">Privacy Policy</a> & <a href="#">Terms of Service</a>
</label>
</div>

<button type="submit">Create Account</button>

</form>

<div class="footer">
Sudah punya akun? <a href="/login">Login</a>
</div>

</div>

<script>
function togglePassword(id, el){
const input = document.getElementById(id);
const show = input.type === "password";

input.type = show ? "text" : "password";
el.classList.toggle("fa-eye");
el.classList.toggle("fa-eye-slash");
}
</script>

</body>
</html>
