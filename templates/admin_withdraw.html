<!DOCTYPE html>
<html>
<head>
    <title>Withdraw Management</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Poppins;
            margin:0;
            padding:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#1e293b;
        }

        th,td{
            padding:15px;
            border-bottom:1px solid #334155;
        }

        th{
            background:#111827;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }
    </style>
</head>
<body>

<h1>Withdraw Management</h1>

<table>

<tr>
    <th>User ID</th>
    <th>Jumlah</th>
    <th>Metode</th>
    <th>Status</th>
    <th>Aksi</th>
</tr>

{% for w in withdraws %}
<tr>

    <td>{{ w.user_id }}</td>
    <td>Rp {{ "{:,.0f}".format(w.amount or 0).replace(",",".") }}</td>
    <td>{{ w.method }}</td>
    <td>{{ w.status }}</td>

    <td>
        {% if w.status == "pending" %}
            <a href="/admin/withdraw/approve/{{ w.id }}">
                Approve
            </a>
            |
            <a href="/admin/withdraw/reject/{{ w.id }}">
                Reject
            </a>
        {% endif %}
    </td>

</tr>
{% endfor %}

</table>

</body>
</html>
