{% extends "base.html" %}
{% block title %}Create Link - EarnShortlink{% endblock %}

{% block extra_css %}
<style>

/* ================= HEADER ================= */
.page-header{
    margin-bottom:20px;
}

.page-header h1{
    font-size:26px;
    font-weight:700;
    margin-bottom:4px;
}

.page-header p{
    color:#94a3b8;
    font-size:14px;
}

/* ================= CARD ================= */
.card{
    background:#111827;
    border:1px solid rgba(255,255,255,.06);
    border-radius:14px;
    padding:18px;
    margin-bottom:18px;
}

.card h2{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:18px;
    margin-bottom:16px;
}

/* ================= INPUT ================= */
.input-field{
    width:100%;
    padding:13px 15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:#0f172a;
    color:#fff;
    outline:none;
    font-size:15px;
    margin-bottom:14px;
}

.input-field:focus{
    border-color:#2196f3;
}

/* ================= BUTTON ================= */
.action-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:13px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
    width:100%;
}

.action-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* ================= RESULT ================= */
.result-box{
    margin-top:16px;
    padding:16px;
    border-radius:14px;
    border:1px solid rgba(34,197,94,.3);
    background:rgba(34,197,94,.08);
}

.result-box h3{
    font-size:16px;
    margin-bottom:10px;
}

.copy-btn{
    margin-top:10px;
    background:#14b8a6;
    border:none;
    color:#fff;
    padding:12px;
    border-radius:12px;
    width:100%;
    cursor:pointer;
}

.copy-btn:hover{
    background:#0d9488;
}

/* ================= EFFECT ================= */
.success-effect{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
}

.success-text{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(45deg,#22c55e,#16a34a);
    color:#fff;
    padding:16px 28px;
    border-radius:14px;
    font-weight:700;
    opacity:0;
}

.success-show{
    animation:popup .8s forwards;
}

@keyframes popup{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.5);}
    60%{opacity:1; transform:translate(-50%,-50%) scale(1.1);}
    100%{opacity:1; transform:translate(-50%,-50%) scale(1);}
}

</style>
{% endblock %}

{% block content %}

<!-- ================= HEADER ================= -->
<div class="page-header">
    <h1>Create Short Link</h1>
    <p>Buat link pendek dan dapatkan penghasilan dari setiap klik</p>
</div>

<!-- ================= CREATE FORM ================= -->
<div class="card">

    <h2>
        <i class="fa-solid fa-link"></i>
        Shorten URL
    </h2>

    <form id="createForm">

        <input
            type="url"
            id="destination_url"
            class="input-field"
            placeholder="https://example.com"
            required>

        <button class="action-btn" type="submit">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Create Link
        </button>

    </form>

    <div id="result" class="result-box" style="display:none;">

        <h3>
            <i class="fa-solid fa-circle-check"></i>
            Link berhasil dibuat
        </h3>

        <input id="shortLink" class="input-field" readonly>

        <button class="copy-btn" onclick="copyLink()">
            <i class="fa-solid fa-copy"></i>
            Copy Link
        </button>

    </div>

</div>

<!-- ================= EFFECT ================= -->
<div id="successEffect" class="success-effect">
    <div class="success-text">🎉 SUCCESS 🎉</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

function showEffect(){
    const text = document.querySelector(".success-text");
    text.classList.remove("success-show");
    void text.offsetWidth;
    text.classList.add("success-show");

    confetti({ particleCount:120, spread:90, origin:{y:0.6} });
}

document.getElementById("createForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const url = document.getElementById("destination_url").value;

    const form = new FormData();
    form.append("destination_url", url);

    const res = await fetch("/create-link", {
        method:"POST",
        body:form
    });

    const data = await res.json();

    if(data.ok){
        document.getElementById("result").style.display = "block";
        document.getElementById("shortLink").value = data.short_link;

        showEffect();

        document.getElementById("destination_url").value = "";
    }else{
        alert("Gagal membuat link");
    }
});

function copyLink(){
    const input = document.getElementById("shortLink");
    navigator.clipboard.writeText(input.value);

    const btn = document.querySelector(".copy-btn");
    btn.innerHTML = "✔ Tersalin";

    setTimeout(()=>{
        btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy Link';
    },2000);
}

</script>

{% endblock %}
