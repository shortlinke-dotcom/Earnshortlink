<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Akun</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Poppins;
}

body{
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#111827;
    border-radius:16px;
    padding:28px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
}

h2{
    text-align:center;
    font-size:22px;
    margin-bottom:6px;
}

p.desc{
    text-align:center;
    font-size:13px;
    color:#9ca3af;
    margin-bottom:18px;
}

label{
    font-size:13px;
    color:#cbd5e1;
    display:block;
    margin-top:14px;
}

input{
    width:100%;
    padding:12px 14px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #1f2937;
    background:#0b1220;
    color:#fff;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#2563eb;
}

.input-box{
    position:relative;
}

.eye{
    position:absolute;
    right:12px;
    top:40px;
    cursor:pointer;
    opacity:0.7;
    transition:0.2s;
}

.eye:hover{
    opacity:1;
}

button{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

button:disabled{
    background:#374151;
    cursor:not-allowed;
}

.error{
    background:#7f1d1d;
    color:#fecaca;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:10px;
}

.strength{
    height:6px;
    background:#1f2937;
    border-radius:10px;
    margin-top:6px;
    overflow:hidden;
}

.strength-bar{
    height:100%;
    width:0%;
    transition:0.3s;
}

small{
    font-size:12px;
    color:#9ca3af;
}
</style>

</head>
<body>

<div class="card">

    <h2>Buat Akun</h2>
    <p class="desc">Lengkapi data untuk melanjutkan</p>

    {% if error %}
    <div class="error">Username sudah digunakan</div>
    {% endif %}

    <form id="setupForm" method="POST" action="/setup-username">

        <input type="hidden" name="email" value="{{ email }}">

        <!-- USERNAME -->
        <label>Username</label>
        <input type="text" id="username" name="username" placeholder="username kamu" required>
        <small id="userMsg"></small>

        <!-- PASSWORD -->
        <label>Password</label>

        <div class="input-box">
            <input type="password" id="password" name="password" placeholder="••••••••" required>

            <!-- ICON EYE (SVG) -->
            <svg class="eye" onclick="togglePassword()" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="#9ca3af" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="#9ca3af" stroke-width="2"/>
            </svg>
        </div>

        <div class="strength">
            <div id="strengthBar" class="strength-bar"></div>
        </div>
        <small id="strengthText"></small>

        <button id="submitBtn" type="submit" disabled>Lanjutkan</button>

    </form>

</div>

<script>
const username=document.getElementById("username");
const password=document.getElementById("password");
const bar=document.getElementById("strengthBar");
const text=document.getElementById("strengthText");
const btn=document.getElementById("submitBtn");
const userMsg=document.getElementById("userMsg");

let usernameValid=false;
let passwordValid=false;

/* PASSWORD TOGGLE */
function togglePassword(){
    password.type = password.type==="password"?"text":"password";
}

/* STRENGTH */
password.addEventListener("input",()=>{
    let v=password.value;
    let s=0;

    if(v.length>=6)s++;
    if(v.length>=10)s++;
    if(/[A-Z]/.test(v))s++;
    if(/[0-9]/.test(v))s++;
    if(/[^A-Za-z0-9]/.test(v))s++;

    let p=(s/5)*100;
    bar.style.width=p+"%";

    if(p<40){
        bar.style.background="#ef4444";
        text.innerText="Lemah";
        passwordValid=false;
    }else if(p<80){
        bar.style.background="#f59e0b";
        text.innerText="Sedang";
        passwordValid=true;
    }else{
        bar.style.background="#22c55e";
        text.innerText="Kuat";
        passwordValid=true;
    }

    check();
});

/* USERNAME CHECK */
let t;
username.addEventListener("input",()=>{
    clearTimeout(t);

    if(username.value.length<3){
        userMsg.innerText="Minimal 3 karakter";
        usernameValid=false;
        check();
        return;
    }

    userMsg.innerText="checking...";

    t=setTimeout(async()=>{
        let r=await fetch("/check-username?u="+username.value);
        let d=await r.json();

        if(d.exists){
            userMsg.innerText="Username sudah dipakai";
            userMsg.style.color="#ef4444";
            usernameValid=false;
        }else{
            userMsg.innerText="Username tersedia";
            userMsg.style.color="#22c55e";
            usernameValid=true;
        }

        check();
    },400);
});

function check(){
    btn.disabled=!(usernameValid && passwordValid);
}

/* SUBMIT */
document.getElementById("setupForm").addEventListener("submit",async(e)=>{
    e.preventDefault();

    let res=await fetch("/setup-username",{
        method:"POST",
        body:new FormData(e.target)
    });

    let d=await res.json();

    if(d.ok){
        window.location.href=d.redirect;
    }else{
        alert(d.error||"error");
    }
});
</script>

</body>
</html>
