<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Akun • EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#2563eb;
    --primary2:#00b8ff;
    --bg:#0b1220;
    --card:#0f172a;
    --border:#1f2937;
    --text:#fff;
    --sub:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    overflow:hidden;
    color:var(--text);
    padding:20px;
}

/* GRID */
body::before{
    content:"";
    position:absolute;
    inset:-100%;
    background-image:
        linear-gradient(rgba(148,163,184,.06) 1px,transparent 1px),
        linear-gradient(90deg,rgba(148,163,184,.06) 1px,transparent 1px);
    background-size:45px 45px;
    animation:gridMove 18s linear infinite;
}

@keyframes gridMove{
    from{transform:translate(0,0);}
    to{transform:translate(-45px,-45px);}
}

/* GLOW */
.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
}

.glow.one{
    width:320px;
    height:320px;
    top:-100px;
    left:-100px;
    background:#2563eb;
    opacity:.15;
}

.glow.two{
    width:300px;
    height:300px;
    right:-120px;
    bottom:-120px;
    background:#00b8ff;
    opacity:.12;
}

/* CARD */
.card{
    position:relative;
    width:100%;
    max-width:420px;
    background:rgba(15,23,42,.92);
    border:1px solid var(--border);
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    backdrop-filter:blur(10px);
    animation:fade .6s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:none;}
}

h2{
    text-align:center;
    font-size:22px;
}

p{
    text-align:center;
    font-size:13px;
    color:var(--sub);
    margin-top:5px;
    margin-bottom:20px;
}

/* INPUT */
label{
    font-size:13px;
    color:#cbd5e1;
    display:block;
    margin-top:14px;
}

input{
    width:100%;
    padding:12px 14px;
    margin-top:6px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#0b1220;
    color:#fff;
    outline:none;
}

input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

small{
    font-size:12px;
    color:var(--sub);
}

/* PASSWORD */
.input-box{
    position:relative;
}

.eye{
    position:absolute;
    right:12px;
    top:38px;
    cursor:pointer;
    opacity:.7;
}

.eye:hover{
    opacity:1;
}

/* STRENGTH */
.strength{
    height:6px;
    background:#1f2937;
    border-radius:10px;
    margin-top:6px;
    overflow:hidden;
}

.strength-bar{
    height:100%;
    width:0%;
    transition:.3s;
}

/* BUTTON */
button{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,var(--primary),var(--primary2));
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:disabled{
    background:#374151;
    cursor:not-allowed;
}

/* particles */
.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:#60a5fa;
    border-radius:50%;
    opacity:.3;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-20vh);}
}

</style>

</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="card">

<h2>Buat Akun</h2>
<p>Lengkapi username & password untuk melanjutkan</p>

{% if error %}
<div style="background:#7f1d1d;color:#fecaca;padding:10px;border-radius:10px;font-size:13px;margin-bottom:10px;">
Username sudah digunakan
</div>
{% endif %}

<form id="setupForm" method="POST" action="/setup-username">

<input type="hidden" name="email" value="{{ email }}">

<!-- USERNAME -->
<label>Username</label>
<input type="text" id="username" name="username" required>
<small id="userMsg"></small>

<!-- PASSWORD -->
<label>Password</label>

<div class="input-box">
<input type="password" id="password" name="password" required>

<svg class="eye" onclick="togglePassword()" width="18" height="18" viewBox="0 0 24 24" fill="none">
<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="#94a3b8" stroke-width="2"/>
<circle cx="12" cy="12" r="3" stroke="#94a3b8" stroke-width="2"/>
</svg>

</div>

<div class="strength">
<div id="strengthBar" class="strength-bar"></div>
</div>

<small id="strengthText"></small>

<button id="submitBtn" type="submit" disabled>Lanjutkan</button>

</form>

</div>

<script>

const username=document.getElementById("username");
const password=document.getElementById("password");
const bar=document.getElementById("strengthBar");
const text=document.getElementById("strengthText");
const btn=document.getElementById("submitBtn");
const userMsg=document.getElementById("userMsg");

let usernameValid=false;
let passwordValid=false;

/* TOGGLE PASSWORD */
function togglePassword(){
    password.type=password.type==="password"?"text":"password";
}

/* STRENGTH */
password.addEventListener("input",()=>{
    let v=password.value;
    let s=0;

    if(v.length>=6)s++;
    if(v.length>=10)s++;
    if(/[A-Z]/.test(v))s++;
    if(/[0-9]/.test(v))s++;
    if(/[^A-Za-z0-9]/.test(v))s++;

    let p=(s/5)*100;
    bar.style.width=p+"%";

    if(p<40){
        bar.style.background="#ef4444";
        text.innerText="Lemah";
        passwordValid=false;
    }else if(p<80){
        bar.style.background="#f59e0b";
        text.innerText="Sedang";
        passwordValid=true;
    }else{
        bar.style.background="#22c55e";
        text.innerText="Kuat";
        passwordValid=true;
    }

    check();
});

/* USERNAME CHECK */
let t;
username.addEventListener("input",()=>{
    clearTimeout(t);

    if(username.value.length<3){
        userMsg.innerText="Minimal 3 karakter";
        usernameValid=false;
        check();
        return;
    }

    userMsg.innerText="checking...";

    t=setTimeout(async()=>{
        let r=await fetch("/check-username?u="+username.value);
        let d=await r.json();

        if(d.exists){
            userMsg.innerText="Username sudah dipakai";
            userMsg.style.color="#ef4444";
            usernameValid=false;
        }else{
            userMsg.innerText="Username tersedia";
            userMsg.style.color="#22c55e";
            usernameValid=true;
        }

        check();
    },400);
});

function check(){
    btn.disabled=!(usernameValid && passwordValid);
}

/* SUBMIT */
document.getElementById("setupForm").addEventListener("submit",async(e)=>{
    e.preventDefault();

    let res=await fetch("/setup-username",{
        method:"POST",
        body:new FormData(e.target)
    });

    let d=await res.json();

    if(d.ok){
        window.location.href=d.redirect;
    }else{
        alert(d.error||"error");
    }
});

</script>

</body>
</html>
