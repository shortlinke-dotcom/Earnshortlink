<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Akun • EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#2563eb;
    --primary2:#1d4ed8;
    --success:#22c55e;
    --danger:#ef4444;
    --warning:#f59e0b;
    --text:#0f172a;
    --sub:#64748b;
    --border:#dbe4f0;
    --card:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    background:
    linear-gradient(135deg,#eff6ff,#f8fafc,#ffffff);
}

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    z-index:-1;
}

.glow.one{
    width:300px;
    height:300px;
    background:#60a5fa55;
    top:-100px;
    left:-100px;
}

.glow.two{
    width:350px;
    height:350px;
    background:#3b82f655;
    right:-120px;
    bottom:-120px;
}

.card{
    width:100%;
    max-width:440px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.5);
    border-radius:28px;
    padding:35px;
    box-shadow:
        0 25px 60px rgba(15,23,42,.12);
    animation:fade .4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.logo{
    width:65px;
    height:65px;
    margin:auto;
    margin-bottom:18px;
    border-radius:18px;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--primary2)
    );
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:28px;
    font-weight:700;
}

h2{
    text-align:center;
    color:var(--text);
    font-size:25px;
    margin-bottom:8px;
}

.desc{
    text-align:center;
    color:var(--sub);
    font-size:14px;
    margin-bottom:25px;
    line-height:1.6;
}

label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:#334155;
    margin-bottom:8px;
    margin-top:16px;
}

input{
    width:100%;
    border:1px solid var(--border);
    background:#f8fafc;
    border-radius:14px;
    padding:14px 16px;
    outline:none;
    transition:.25s;
    font-size:14px;
}

input:focus{
    background:#fff;
    border-color:var(--primary);
    box-shadow:
        0 0 0 4px rgba(37,99,235,.12);
}

.input-box{
    position:relative;
}

.input-box input{
    padding-right:50px;
}

.eye{
    position:absolute;
    top:50%;
    right:15px;
    transform:translateY(-50%);
    cursor:pointer;
    opacity:.6;
}

.eye:hover{
    opacity:1;
}

small{
    display:block;
    margin-top:8px;
    font-size:12px;
    min-height:18px;
}

.strength{
    width:100%;
    height:6px;
    border-radius:20px;
    background:#e2e8f0;
    overflow:hidden;
    margin-top:10px;
}

.strength-bar{
    width:0;
    height:100%;
    transition:.3s;
}

button{
    width:100%;
    margin-top:24px;
    border:none;
    padding:14px;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--primary2)
    );
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    background:#94a3b8;
    transform:none;
    cursor:not-allowed;
}

.alert{
    background:#fef2f2;
    border:1px solid #fecaca;
    color:#b91c1c;
    padding:12px;
    border-radius:12px;
    font-size:13px;
    margin-bottom:18px;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#94a3b8;
}

@media(max-width:500px){
    body{
        padding:15px;
    }

    .card{
        padding:28px 22px;
        border-radius:24px;
    }

    h2{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="card">

<div class="logo">E</div>

<h2>Buat Akun</h2>
<p class="desc">
Lengkapi username dan password untuk menyelesaikan pendaftaran akun Anda.
</p>

{% if error %}
<div class="alert">
Username sudah digunakan.
</div>
{% endif %}

<form id="setupForm">

<input type="hidden" name="email" value="{{ email }}">

<label>Username</label>
<input
    type="text"
    id="username"
    name="username"
    autocomplete="off"
    required
>
<small id="userMsg"></small>

<label>Password</label>

<div class="input-box">
<input
    type="password"
    id="password"
    name="password"
    autocomplete="new-password"
    required
>

<svg class="eye"
onclick="togglePassword()"
width="20"
height="20"
viewBox="0 0 24 24"
fill="none">
<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"
stroke="#64748b"
stroke-width="2"/>
<circle
cx="12"
cy="12"
r="3"
stroke="#64748b"
stroke-width="2"/>
</svg>

</div>

<div class="strength">
<div class="strength-bar" id="strengthBar"></div>
</div>

<small id="strengthText"></small>

<button id="submitBtn" disabled>
Lanjutkan
</button>

</form>

<div class="footer">
© EarnShortlink
</div>

</div>

<script>
const username=document.getElementById("username");
const password=document.getElementById("password");
const userMsg=document.getElementById("userMsg");
const strengthBar=document.getElementById("strengthBar");
const strengthText=document.getElementById("strengthText");
const submitBtn=document.getElementById("submitBtn");

let usernameValid=false;
let passwordValid=false;

function togglePassword(){
    password.type=
        password.type==="password"
        ? "text"
        : "password";
}

password.addEventListener("input",()=>{

    let v=password.value;
    let s=0;

    if(v.length>=6)s++;
    if(v.length>=10)s++;
    if(/[A-Z]/.test(v))s++;
    if(/[0-9]/.test(v))s++;
    if(/[^A-Za-z0-9]/.test(v))s++;

    let p=(s/5)*100;

    strengthBar.style.width=p+"%";

    if(v.length>72){
        strengthBar.style.background="#ef4444";
        strengthText.innerText="Maksimal 72 karakter";
        passwordValid=false;
    }
    else if(p<40){
        strengthBar.style.background="#ef4444";
        strengthText.innerText="Password lemah";
        passwordValid=false;
    }
    else if(p<80){
        strengthBar.style.background="#f59e0b";
        strengthText.innerText="Password sedang";
        passwordValid=true;
    }
    else{
        strengthBar.style.background="#22c55e";
        strengthText.innerText="Password kuat";
        passwordValid=true;
    }

    check();
});

let timer;

username.addEventListener("input",()=>{

    clearTimeout(timer);

    let value=username.value.trim().toLowerCase();

    if(value.length<3){
        userMsg.innerText="Minimal 3 karakter";
        userMsg.style.color="#ef4444";
        usernameValid=false;
        check();
        return;
    }

    userMsg.innerText="Memeriksa...";
    userMsg.style.color="#64748b";

    timer=setTimeout(async()=>{

        try{
            let r=await fetch(
                "/check-username?u="+encodeURIComponent(value)
            );

            let d=await r.json();

            if(d.exists){
                userMsg.innerText="Username sudah dipakai";
                userMsg.style.color="#ef4444";
                usernameValid=false;
            }
            else{
                userMsg.innerText="Username tersedia";
                userMsg.style.color="#22c55e";
                usernameValid=true;
            }
        }
        catch{
            userMsg.innerText="Gagal memeriksa username";
            userMsg.style.color="#ef4444";
            usernameValid=false;
        }

        check();

    },400);
});

function check(){
    submitBtn.disabled=
        !(usernameValid && passwordValid);
}

document.getElementById("setupForm")
.addEventListener("submit", async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.innerText = "Memproses...";

    try {
        const res = await fetch("/setup-username", {
            method: "POST",
            body: new FormData(e.target)
        });

        const d = await res.json();

        if (d.ok) {
            window.location.href = d.redirect;
            return;
        }

        throw new Error(d.error || "Terjadi kesalahan.");

    } catch (err) {
        console.error(err);

        submitBtn.disabled = false;
        submitBtn.innerText = "Lanjutkan";

        alert(err.message || "Terjadi kesalahan.");
    }
});
</script>

</body>
</html>
