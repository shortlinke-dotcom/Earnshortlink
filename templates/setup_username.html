<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Akun • EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#2563eb;
    --text:#0f172a;
    --sub:#64748b;
    --border:#dbe4f0;
    --card:#ffffff;
    --bg:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid #e5e7eb;
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 50px rgba(15,23,42,.08);
    animation:fade .4s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(15px);}
    to{opacity:1;transform:none;}
}

h2{
    text-align:center;
    font-size:22px;
    color:var(--text);
}

p{
    text-align:center;
    font-size:13px;
    color:var(--sub);
    margin-top:5px;
    margin-bottom:20px;
}

/* INPUT */
label{
    font-size:13px;
    color:#334155;
    display:block;
    margin-top:14px;
}

input{
    width:100%;
    padding:12px 14px;
    margin-top:6px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#f8fafc;
    color:var(--text);
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
    background:#fff;
}

small{
    font-size:12px;
    color:var(--sub);
}

/* PASSWORD */
.input-box{
    position:relative;
}

.input-box input{
    padding-right:42px;
}

.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    opacity:.6;
    transition:.2s;
}

.eye:hover{
    opacity:1;
}

/* STRENGTH */
.strength{
    height:6px;
    background:#e5e7eb;
    border-radius:10px;
    margin-top:6px;
    overflow:hidden;
}

.strength-bar{
    height:100%;
    width:0%;
    transition:.3s;
}

/* BUTTON */
button{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#1d4ed8;
}

button:disabled{
    background:#94a3b8;
    cursor:not-allowed;
}

</style>

</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="card">

<h2>Buat Akun</h2>
<p>Lengkapi username & password untuk melanjutkan</p>

{% if error %}
<div style="background:#7f1d1d;color:#fecaca;padding:10px;border-radius:10px;font-size:13px;margin-bottom:10px;">
Username sudah digunakan
</div>
{% endif %}

<form id="setupForm" method="POST" action="/setup-username">

<input type="hidden" name="email" value="{{ email }}">

<!-- USERNAME -->
<label>Username</label>
<input type="text" id="username" name="username" required>
<small id="userMsg"></small>

<!-- PASSWORD -->
<label>Password</label>

<div class="input-box">
<input type="password" id="password" name="password" required>

<svg class="eye" onclick="togglePassword()" width="18" height="18" viewBox="0 0 24 24" fill="none">
<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="#94a3b8" stroke-width="2"/>
<circle cx="12" cy="12" r="3" stroke="#94a3b8" stroke-width="2"/>
</svg>

</div>

<div class="strength">
<div id="strengthBar" class="strength-bar"></div>
</div>

<small id="strengthText"></small>

<button id="submitBtn" type="submit" disabled>Lanjutkan</button>

</form>

</div>

<script>

const username=document.getElementById("username");
const password=document.getElementById("password");
const bar=document.getElementById("strengthBar");
const text=document.getElementById("strengthText");
const btn=document.getElementById("submitBtn");
const userMsg=document.getElementById("userMsg");

let usernameValid=false;
let passwordValid=false;

/* TOGGLE PASSWORD */
function togglePassword(){
    password.type=password.type==="password"?"text":"password";
}

/* STRENGTH */
password.addEventListener("input",()=>{
    let v=password.value;
    let s=0;

    if(v.length>=6)s++;
    if(v.length>=10)s++;
    if(/[A-Z]/.test(v))s++;
    if(/[0-9]/.test(v))s++;
    if(/[^A-Za-z0-9]/.test(v))s++;

    let p=(s/5)*100;
    bar.style.width=p+"%";

    if(p<40){
        bar.style.background="#ef4444";
        text.innerText="Lemah";
        passwordValid=false;
    }else if(p<80){
        bar.style.background="#f59e0b";
        text.innerText="Sedang";
        passwordValid=true;
    }else{
        bar.style.background="#22c55e";
        text.innerText="Kuat";
        passwordValid=true;
    }

    check();
});

/* USERNAME CHECK */
let t;
username.addEventListener("input",()=>{
    clearTimeout(t);

    if(username.value.length<3){
        userMsg.innerText="Minimal 3 karakter";
        usernameValid=false;
        check();
        return;
    }

    userMsg.innerText="checking...";

    t=setTimeout(async()=>{
        let r=await fetch("/check-username?u="+username.value);
        let d=await r.json();

        if(d.exists){
            userMsg.innerText="Username sudah dipakai";
            userMsg.style.color="#ef4444";
            usernameValid=false;
        }else{
            userMsg.innerText="Username tersedia";
            userMsg.style.color="#22c55e";
            usernameValid=true;
        }

        check();
    },400);
});

function check(){
    btn.disabled=!(usernameValid && passwordValid);
}

/* SUBMIT */
document.getElementById("setupForm").addEventListener("submit",async(e)=>{
    e.preventDefault();

    let res=await fetch("/setup-username",{
        method:"POST",
        body:new FormData(e.target)
    });

    let d=await res.json();

    if(d.ok){
        window.location.href=d.redirect;
    }else{
        alert(d.error||"error");
    }
});

</script>

</body>
</html>
