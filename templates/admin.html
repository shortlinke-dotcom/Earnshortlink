<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Poppins;
            margin:0;
        }

        .container{
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:20px;
        }

        .card h2{
            margin:0;
            font-size:35px;
        }

        .card p{
            color:#94a3b8;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#1e293b;
            border-radius:20px;
            overflow:hidden;
        }

        th,
        td{
            padding:15px;
            border-bottom:1px solid #334155;
            text-align:left;
        }

        th{
            background:#111827;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>
        <i class="fas fa-shield-alt"></i>
        Admin Panel
    </h1>

    <div class="cards">

        <div class="card">
            <h2>{{ total_users }}</h2>
            <p>Total Users</p>
        </div>

        <div class="card">
            <h2>{{ total_links }}</h2>
            <p>Total Links</p>
        </div>

        <div class="card">
            <h2>{{ total_sell_links }}</h2>
            <p>Sell Links</p>
        </div>

        <div class="card">
            <h2>{{ withdraw_count }}</h2>
            <p>Pending Withdraw</p>
        </div>

    </div>

    <h2>User Terbaru</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Gmail</th>
            <th>Saldo</th>
        </tr>

        {% for u in latest_users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.gmail }}</td>
            <td>Rp {{ u.saldo or 0 }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
