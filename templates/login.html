<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020817;
--card:#0f172a;
--text:#fff;
--sub:#94a3b8;
--primary:#3b82f6;
}

@media (prefers-color-scheme: light){
:root{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--sub:#64748b;
}
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* CONTAINER */
.container{
width:100%;
max-width:380px;
text-align:center;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:800;
margin-bottom:10px;
}
.logo span{
color:var(--primary);
}

/* SUB */
.subtitle{
font-size:14px;
color:var(--sub);
margin-bottom:25px;
}

/* CARD */
.card{
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-bottom:12px;
background:rgba(255,255,255,.05);
color:var(--text);
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
margin-top:5px;
}

/* LOGIN */
.btn-primary{
background:var(--primary);
color:#fff;
}

/* GOOGLE */
.btn-google{
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:15px;
}

/* ALERT */
.alert{
background:#ef4444;
padding:10px;
border-radius:10px;
font-size:13px;
margin-bottom:15px;
}

/* DIVIDER */
.divider{
margin:15px 0;
font-size:13px;
color:var(--sub);
}
/* WRAP */
.logo-wrap{
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
}

/* TEXT */
.logo-text-anim{
    font-size: 32px;
    font-weight: 800;
    display: flex;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transform: translateX(-120px) scale(0.9);
    animation: slideIn 1.4s cubic-bezier(.22,1,.36,1) forwards;
    animation-delay: .4s;
}

.logo-text-anim span:first-child{
    color: #fff;
}

.logo-text-anim span:last-child{
    color: #3b82f6;
}

/* SLIDE TEXT */
@keyframes slideIn{
    to{
        opacity: 1;
        transform: translateX(0);
    }
}

/* SMOKE EFFECT */
.smoke{
    position: absolute;
    width: 200%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 10%, transparent 60%);
    filter: blur(20px);
    animation: smokeMove 3s linear infinite;
    opacity: .4;
}

@keyframes smokeMove{
    from{
        transform: translateX(-50%);
    }
    to{
        transform: translateX(50%);
    }
}
.smoke::after{
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 10%, transparent 60%);
    filter: blur(30px);
    animation: smokeMove 6s linear infinite reverse;
}

/* LIGHTNING */
.lightning{
    position: absolute;
    top: 0;
    left: -100%;
    width: 120%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(59,130,246,0.9), transparent);
    animation: lightningMove 2.5s linear infinite;
}

@keyframes lightningMove{
    0%{
        left: -100%;
        opacity: 0;
    }
    50%{
        opacity: 1;
    }
    100%{
        left: 100%;
        opacity: 0;
    }
}
.logo-text-anim{
    text-shadow: 0 0 20px rgba(59,130,246,0.8);
}
.logo-wrap::after{
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(59,130,246,0.15);
    opacity: 0;
    animation: flash 2.5s infinite;
}

@keyframes flash{
    0%, 80%, 100%{
        opacity: 0;
    }
    85%{
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
    <div class="smoke"></div>
    <div class="lightning"></div>
    <h1 class="logo-text-anim">
        <span>EARN</span><span>SHORTLINK</span>
    </h1>
</div>
<div class="subtitle">Login untuk melanjutkan</div>

<div class="card">

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form action="/login" method="POST">
<input type="text" name="login" placeholder="Email / Username" required>
<input type="password" name="password" placeholder="Password" required>

<button class="btn btn-primary">
Masuk
</button>
</form>

<div class="divider">atau</div>

<a href="/auth/google" style="text-decoration:none;">
<button class="btn btn-google">
<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
Login dengan Google
</button>
</a>

</div>

</div>

</body>
</html>
