<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • Link4Earn</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
    font-family:"Poppins",sans-serif;
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top left,#dbeafe 0%,transparent 45%),
        radial-gradient(circle at bottom right,#bfdbfe 0%,transparent 40%),
        linear-gradient(135deg,#f8fafc,#eef4ff);

    color:#0f172a;
}

/* ================= CARD ================= */
.card{
    width:92%;
    max-width:420px;

    padding:28px;
    border-radius:18px;

    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 20px 50px rgba(15,23,42,.08);
}

/* ================= TITLE ================= */
.title{
    text-align:center;
    margin-bottom:18px;
}

.title h1{
    font-size:26px;
    font-weight:800;
}

.title p{
    font-size:13px;
    color:#64748b;
}

/* ================= INPUT ================= */
.input{
    width:100%;
    padding:12px 14px;
    margin-bottom:12px;

    border-radius:12px;
    border:1px solid rgba(148,163,184,.3);

    outline:none;
    background:rgba(255,255,255,.8);
}

.input:focus{
    border-color:#3b82f6;
}

/* ================= BUTTON ================= */
.btn{
    width:100%;
    padding:12px;

    border:none;
    border-radius:12px;

    font-weight:700;
    cursor:pointer;

    color:#fff;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.btn:hover{
    opacity:.95;
}

/* ================= GOOGLE ================= */
.google{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    margin-top:12px;
    padding:12px;

    border-radius:12px;
    border:1px solid rgba(148,163,184,.3);

    text-decoration:none;
    color:#0f172a;
    background:rgba(255,255,255,.7);
    font-weight:600;
}

.google img{
    width:20px;
}

/* ================= REGISTER ================= */
.register{
    text-align:center;
    margin-top:14px;
    font-size:13px;
    color:#64748b;
}

.register a{
    color:#2563eb;
    font-weight:700;
    text-decoration:none;
}

/* ================= ALERT ================= */
.alert{
    background:#fee2e2;
    color:#b91c1c;

    padding:10px;
    border-radius:10px;
    font-size:13px;

    margin-bottom:12px;
}

/* ================= FOOTER ================= */
.footer{
    text-align:center;
    font-size:12px;
    color:#94a3b8;

    margin-top:18px;
}

/* ================= MOBILE ================= */
@media (max-width:480px){
    .card{
        padding:22px;
        border-radius:16px;
    }

    .title h1{
        font-size:22px;
    }
}
.brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:20px;
}

/* ICON HIDUP */
.brand-icon{
    width:56px;
    height:56px;
    border-radius:16px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#3b82f6,#00b8ff);

    box-shadow:0 0 25px rgba(59,130,246,.35);

    animation:pulseGlow 2.5s infinite;
}

.brand-icon i{
    color:#fff;
    font-size:24px;
}

/* TEXT */
.brand-text h1{
    font-size:24px;
    font-weight:800;
}

.brand-text h1 span{
    background:linear-gradient(90deg,#3b82f6,#00b8ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:textShine 3s infinite linear;
}

.brand-text p{
    font-size:12px;
    color:#64748b;
}

/* ANIMATION */
@keyframes pulseGlow{
    0%{
        box-shadow:0 0 10px rgba(59,130,246,.25);
        transform:scale(1);
    }
    50%{
        box-shadow:0 0 30px rgba(0,184,255,.45);
        transform:scale(1.05);
    }
    100%{
        box-shadow:0 0 10px rgba(59,130,246,.25);
        transform:scale(1);
    }
}

@keyframes textShine{
    0%{filter:brightness(1);}
    50%{filter:brightness(1.4);}
    100%{filter:brightness(1);}
}
</style>
</head>

<body>

<div class="card">

    <div class="brand">

    <div class="brand-icon">
        <i class="fa-solid fa-link"></i>
    </div>

    <div class="brand-text">
        <h1>Link<span>4Earn</span></h1>
        <p>Login</p>
    </div>

</div>
    {% if error %}
    <div class="alert">
        {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">

        <input class="input" type="text" name="login" placeholder="Email / Username" required>

        <input class="input" type="password" name="password" placeholder="Password" required>

        <button class="btn">Masuk</button>

    </form>

    <a href="/auth/google" class="google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg">
        Login dengan Google
    </a>

    <div class="register">
        Belum punya akun?
        <a href="/register">Register sekarang</a>
    </div>

    <div class="footer">
        © 2026 EarnShortlink • All rights reserved
    </div>

</div>

</body>
</html>
