<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

:root{
    --card:#ffffff;
    --card2:#f8fafc;
    --border:#e2e8f0;
    --text:#0f172a;
    --sub:#64748b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:#ffffff;
    color:#0f172a;
}

/* GRID */

body::before{
    content:"";
    position:absolute;
    inset:-100%;
    background-image:
        linear-gradient(rgba(15,23,42,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,23,42,.04) 1px, transparent 1px);
    background-size:45px 45px;
    animation:gridMove 18s linear infinite;
    opacity:1;
}

@keyframes gridMove{

0%{
transform:translate(0,0);
}

100%{
transform:translate(-45px,-45px);
}

}

/* GLOW */

.glow{

position:absolute;
border-radius:50%;
filter:blur(120px);

}

.glow.one{
    background:#60a5fa;
    opacity:.18;
}

.glow.two{
    background:#38bdf8;
    opacity:.15;
}

@keyframes float1{

50%{
transform:translateY(40px);
}

}

@keyframes float2{

50%{
transform:translate(-30px,-30px);
}

}

/* PARTICLES */

.particles{

position:absolute;
inset:0;

overflow:hidden;

}

.particles span{

position:absolute;

display:block;

width:4px;
height:4px;

border-radius:50%;

background:#5da9ff;

opacity:.4;

animation:particle 12s linear infinite;

}

.particles span:nth-child(1){left:10%;top:100%;animation-delay:0s;}
.particles span:nth-child(2){left:25%;top:100%;animation-delay:2s;}
.particles span:nth-child(3){left:42%;top:100%;animation-delay:4s;}
.particles span:nth-child(4){left:58%;top:100%;animation-delay:6s;}
.particles span:nth-child(5){left:74%;top:100%;animation-delay:8s;}
.particles span:nth-child(6){left:90%;top:100%;animation-delay:10s;}

@keyframes particle{

0%{

transform:translateY(0) scale(0);

opacity:0;

}

20%{

opacity:.45;

transform:scale(1);

}

100%{

transform:translateY(-110vh);

opacity:0;

}

}

/* LOGIN */

.login-box{

position:relative;

width:100%;
max-width:430px;

padding:34px;

border-radius:28px;

background:var(--card);

backdrop-filter:blur(24px);

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 0 60px rgba(0,162,255,.18),
0 15px 60px rgba(0,0,0,.45);

z-index:5;

animation:popup .8s ease;

}

@keyframes popup{

from{

opacity:0;

transform:translateY(40px) scale(.95);

}

to{

opacity:1;

transform:none;

}

}

.login-box::before{

content:"";

position:absolute;

inset:0;

padding:1px;

border-radius:28px;

background:linear-gradient(135deg,
rgba(59,130,246,.7),
transparent,
rgba(0,194,255,.7));

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;

mask-composite:exclude;

pointer-events:none;

}

/* ===========================
   INPUT
=========================== */

.group{
    position:relative;
    margin-bottom:18px;
}

.group input{
    width:100%;
    height:54px;
    padding:0 50px 0 48px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,.08);
    background:var(--card2);
    color:#fff;
    font-size:14px;
    outline:none;
    transition:.25s;
}

.group input::placeholder{
    color:#93a4c8;
}

.group input:focus{
    border-color:#3b82f6;
    background:rgba(255,255,255,.05);
    box-shadow:
        0 0 0 4px rgba(59,130,246,.12),
        0 0 20px rgba(59,130,246,.18);
}

.group .fa-user,
.group .fa-lock{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#7ea8ff;
    font-size:15px;
    pointer-events:none;
    z-index:2;
}

.group .toggle{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    color:#8da4cb;
    cursor:pointer;
    font-size:16px;
    z-index:3;
}

.group .toggle:hover{
    color:#3b82f6;
}
/* ===========================
   BUTTON
=========================== */

.btn{

width:100%;

height:54px;

border:none;

border-radius:15px;

font-weight:700;

font-size:15px;

cursor:pointer;

transition:.3s;

}

.btn-login{

background:linear-gradient(90deg,#2563eb,#00b8ff);

color:#fff;

box-shadow:

0 12px 35px rgba(37,99,235,.35);

}

.btn-login:hover{

transform:translateY(-2px);

box-shadow:

0 18px 40px rgba(37,99,235,.55);

}

.or{

display:flex;

align-items:center;

gap:12px;

margin:24px 0;

color:#90a2c6;

font-size:13px;

}

.or::before,
.or::after{

content:"";

flex:1;

height:1px;

background:rgba(255,255,255,.08);

}

.google{

display:flex;

justify-content:center;

align-items:center;

gap:12px;

width:100%;

height:54px;

border-radius:15px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

text-decoration:none;

color:#fff;

font-weight:600;

transition:.25s;

}

.google:hover{

background:rgba(255,255,255,.08);

border-color:#3b82f6;

}

.google img{

width:22px;

}

.alert{

background:rgba(239,68,68,.15);

border:1px solid rgba(239,68,68,.4);

padding:13px;

border-radius:14px;

margin-bottom:18px;

font-size:13px;

color:#ffd4d4;

}

.footer{

margin-top:22px;

text-align:center;

font-size:12px;

color:#7d8fb1;

}
.brand{
display:flex;
align-items:center;
justify-content:center;
gap:16px;
margin-bottom:35px;
}

.brand-icon{
    width:62px;
    height:62px;
    border-radius:18px;
    background:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 35px rgba(255,255,255,.15);
}

.brand-icon i{
    font-size:28px;
    color:#2563eb;
}

.brand-text{
text-align:left;
}

.brand-text h1{
    font-size:28px;
    font-weight:800;
    color:#fff;
}

.brand-text h1 span{
    color:#fff;
    background:none;
    -webkit-text-fill-color:#fff;
}

.brand-text p{
font-size:13px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="login-box">

<div class="brand">

    <div class="brand-icon">
        <i class="fa-solid fa-link"></i>
    </div>

    <div class="brand-text">
        <h1>Earn<span>Shortlink</span></h1>
        <p>Welcome back! Login untuk melanjutkan.</p>
    </div>

</div>

{% if error %}
<div class="alert">
{{ error }}
</div>
{% endif %}

<form action="/login" method="POST">

<div class="group">
<i class="fa-solid fa-user"></i>
<input
type="text"
name="login"
placeholder="Email atau Username"
required>
</div>

<div class="group">
<i class="fa-solid fa-lock"></i>

<input
id="password"
type="password"
name="password"
placeholder="Password"
required>

<i class="fa-regular fa-eye toggle"
id="togglePassword"></i>
</div>

<button class="btn btn-login">
Masuk
</button>

</form>

<div class="or">
atau
</div>

<a href="/auth/google" class="google">

<img src="https://www.svgrepo.com/show/475656/google-color.svg">

<span>Login dengan Google</span>

</a>

<div class="footer">

© 2026 EarnShortlink

</div>
</div>
<script>

// =========================
// SHOW / HIDE PASSWORD
// =========================

const toggle = document.getElementById("togglePassword");
const password = document.getElementById("password");

toggle.addEventListener("click",()=>{

if(password.type==="password"){

password.type="text";

toggle.classList.remove("fa-eye");
toggle.classList.add("fa-eye-slash");

}else{

password.type="password";

toggle.classList.remove("fa-eye-slash");
toggle.classList.add("fa-eye");

}

});

// =========================
// LOGIN LOADING
// =========================

const form=document.querySelector("form");
const loginBtn=document.querySelector(".btn-login");

form.addEventListener("submit",()=>{

loginBtn.disabled=true;

loginBtn.innerHTML=`
<i class="fa-solid fa-spinner fa-spin"></i>
&nbsp;Sedang Masuk...
`;

});

// =========================
// RIPPLE EFFECT
// =========================

document.querySelectorAll(".btn").forEach(btn=>{

btn.addEventListener("click",function(e){

const circle=document.createElement("span");

const d=Math.max(this.clientWidth,this.clientHeight);

circle.style.width=d+"px";
circle.style.height=d+"px";

circle.style.left=e.offsetX-d/2+"px";
circle.style.top=e.offsetY-d/2+"px";

circle.style.position="absolute";
circle.style.borderRadius="50%";
circle.style.background="rgba(255,255,255,.25)";
circle.style.transform="scale(0)";
circle.style.animation="ripple .6s linear";
circle.style.pointerEvents="none";

this.appendChild(circle);

setTimeout(()=>circle.remove(),600);

});

});

// =========================
// BUTTON STYLE
// =========================

document.querySelectorAll(".btn").forEach(btn=>{

btn.style.position="relative";
btn.style.overflow="hidden";

});

// =========================
// RIPPLE KEYFRAME
// =========================

const style=document.createElement("style");

style.innerHTML=`

@keyframes ripple{

to{

transform:scale(4);
opacity:0;

}

}

`;

document.head.appendChild(style);

// =========================
// CARD FLOAT
// =========================

const card=document.querySelector(".login-box");

document.addEventListener("mousemove",(e)=>{

const x=(e.clientX-window.innerWidth/2)/35;
const y=(e.clientY-window.innerHeight/2)/35;

card.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;

});

document.addEventListener("mouseleave",()=>{

card.style.transform="rotateX(0) rotateY(0)";

});

</script>

</body>
</html>
