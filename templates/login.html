<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EarnShortlink</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
background:#020817;
color:#fff;
overflow-x:hidden;
}
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564');
background-size:cover;
background-position:center;
z-index:-1;
}
.login-section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}
.login-card{
width:100%;
max-width:600px;
padding:40px;
border-radius:25px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(15px);
border:1px solid rgba(33,150,243,.4);
box-shadow:
0 0 25px rgba(33,150,243,.3),
0 0 60px rgba(33,150,243,.1);
}
.login-header{
text-align:center;
margin-bottom:30px;
}
.login-header h1{
font-size:52px;
font-weight:800;
}
.login-header span{
color:#2196f3;
}
.login-header p{
margin-top:10px;
color:#cbd5e1;
}
.form-group{
margin-bottom:18px;
}
.form-group input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
color:#fff;
font-size:15px;
transition:.3s;
}
.form-group input:focus{
border-color:#2196f3;
box-shadow:0 0 15px rgba(33,150,243,.5);
}
.form-group input::placeholder{
color:#94a3b8;
}
.forgot-password{
text-align:right;
margin-bottom:15px;
}
.forgot-password a{
color:#2196f3;
text-decoration:none;
font-size:13px;
}
.remember-box{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
font-size:14px;
color:#cbd5e1;
}
.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#2196f3;
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}
.login-btn:hover{
transform:translateY(-2px);
box-shadow:
0 0 20px rgba(33,150,243,.6);
}
.register-link{
margin-top:20px;
text-align:center;
color:#cbd5e1;
}
.register-link a{
color:#2196f3;
font-weight:700;
text-decoration:none;
}
/* DESKTOP */
@media(min-width:769px){
.login-card{
max-width:600px;
}
}
/* ANDROID */
@media(max-width:768px){
.login-section{
padding:0;
}
.login-card{
width:100%;
max-width:100%;
min-height:100vh;
border-radius:0;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
}
.login-header h1{
font-size:34px;
}
.login-header p{
font-size:14px;
}
.form-group input{
padding:15px;
font-size:14px;
}
.login-btn{
padding:15px;
font-size:15px;
}
}
/* HP KECIL */
@media(max-width:480px){
.login-header h1{
font-size:30px;
}
.form-group input{
padding:14px;
}
}
</style>
</head>
<body>
<div class="bg"></div>
<section class="login-section">
<div class="login-card">
<div class="login-header">
<h1>EARN<span>SHORTLINK</span></h1>
<p>Masuk ke akun Anda dan mulai menghasilkan saldo</p>
</div>
<form action="/login" method="POST">
<div class="form-group">
<input type="text"
name="username"
placeholder="Gmail atau Nama Akun"
required>
</div>
<div class="form-group">
<input type="password"
name="password"
placeholder="Kata Sandi"
required>
</div>
<div class="forgot-password">
<a href="#">Lupa Kata Sandi?</a>
</div>
<div class="remember-box">
<input type="checkbox" id="remember">
<label for="remember">Ingatkan Saya</label>
</div>
<button type="submit" class="login-btn">
Masuk
</button>
</form>
<div class="register-link">
Belum punya akun?
<a href="/register">Daftar Sekarang</a>
</div>
</div>
</section>
</body>
</html>
