<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • ESLink • EarnShortLINK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
    font-family:"Poppins",sans-serif;
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at top left,#dbeafe 0%,transparent 45%),
        radial-gradient(circle at bottom right,#bfdbfe 0%,transparent 40%),
        linear-gradient(135deg,#f8fafc,#eef4ff);

    color:#0f172a;
}

/* ================= CARD ================= */
.card{
    width:92%;
    max-width:420px;

    padding:28px;
    border-radius:18px;

    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 20px 50px rgba(15,23,42,.08);
}

/* ================= TITLE ================= */
.title{
    text-align:center;
    margin-bottom:18px;
}

.title h1{
    font-size:26px;
    font-weight:800;
}

.title p{
    font-size:13px;
    color:#64748b;
}

/* ================= INPUT ================= */
.input{
    width:100%;
    padding:12px 14px;
    margin-bottom:12px;

    border-radius:12px;
    border:1px solid rgba(148,163,184,.3);

    outline:none;
    background:rgba(255,255,255,.8);
}

.input:focus{
    border-color:#3b82f6;
}

/* ================= BUTTON ================= */
.btn{
    width:100%;
    padding:12px;

    border:none;
    border-radius:12px;

    font-weight:700;
    cursor:pointer;

    color:#fff;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.btn:hover{
    opacity:.95;
}

/* ================= GOOGLE ================= */
.google{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;

    margin-top:12px;
    padding:12px;

    border-radius:12px;
    border:1px solid rgba(148,163,184,.3);

    text-decoration:none;
    color:#0f172a;
    background:rgba(255,255,255,.7);
    font-weight:600;
}

.google img{
    width:20px;
}

/* ================= REGISTER ================= */
.register{
    text-align:center;
    margin-top:14px;
    font-size:13px;
    color:#64748b;
}

.register a{
    color:#2563eb;
    font-weight:700;
    text-decoration:none;
}

/* ================= ALERT ================= */
.alert{
    background:#fee2e2;
    color:#b91c1c;

    padding:10px;
    border-radius:10px;
    font-size:13px;

    margin-bottom:12px;
}

/* ================= FOOTER ================= */
.footer{
    text-align:center;
    font-size:12px;
    color:#94a3b8;

    margin-top:18px;
}

/* ================= MOBILE ================= */
@media (max-width:480px){
    .card{
        padding:22px;
        border-radius:16px;
    }

    .title h1{
        font-size:22px;
    }
}
.brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:20px;
}

/* ICON HIDUP */
.brand-icon{
    width:56px;
    height:56px;
    border-radius:16px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#3b82f6,#00b8ff);

    box-shadow:0 0 25px rgba(59,130,246,.35);

    animation:pulseGlow 2.5s infinite;
}

.brand-icon i{
    color:#fff;
    font-size:24px;
}

/* TEXT */
.brand-text h1{
    font-size:24px;
    font-weight:800;
}

.brand-text h1 span{
    background:linear-gradient(90deg,#3b82f6,#00b8ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:textShine 3s infinite linear;
}

.brand-text p{
    font-size:12px;
    color:#64748b;
}

/* ANIMATION */
@keyframes pulseGlow{
    0%{
        box-shadow:0 0 10px rgba(59,130,246,.25);
        transform:scale(1);
    }
    50%{
        box-shadow:0 0 30px rgba(0,184,255,.45);
        transform:scale(1.05);
    }
    100%{
        box-shadow:0 0 10px rgba(59,130,246,.25);
        transform:scale(1);
    }
}

@keyframes textShine{
    0%{filter:brightness(1);}
    50%{filter:brightness(1.4);}
    100%{filter:brightness(1);}
}
/* ================= RESPONSIVE ================= */
*{
    box-sizing:border-box;
}

.card{
    width:100%;
    max-width:440px;
    margin:20px;
}

.input,
.btn,
.google{
    width:100%;
    box-sizing:border-box;
}

.brand-text h1{
    margin:0;
    line-height:1.2;
}

.brand-text p{
    margin-top:4px;
    line-height:1.4;
}

/* Tablet */
@media (max-width:768px){
    body{
        padding:20px;
    }

    .card{
        max-width:430px;
        padding:24px;
    }

    .brand-icon{
        width:52px;
        height:52px;
    }

    .brand-icon i{
        font-size:22px;
    }

    .brand-text h1{
        font-size:22px;
    }
}

/* Android kecil */
@media (max-width:480px){
    body{
        padding:15px;
        align-items:center;
    }

    .card{
        width:100%;
        padding:22px 18px;
        border-radius:18px;
    }

    .brand{
        gap:12px;
    }

    .brand-icon{
        width:48px;
        height:48px;
        border-radius:14px;
    }

    .brand-icon i{
        font-size:20px;
    }

    .brand-text h1{
        font-size:20px;
    }

    .brand-text p{
        font-size:11px;
    }

    .input,
    .btn,
    .google{
        padding:13px;
        font-size:14px;
    }

    .footer{
        font-size:11px;
    }
}

/* Desktop besar */
@media (min-width:1200px){
    .card{
        max-width:470px;
        padding:32px;
    }

    .brand-text h1{
        font-size:28px;
    }
}
.password-box{
    position:relative;
    margin-bottom:15px;
}

.password-input{
    margin:0;
    padding-right:50px;
}

.eye-btn{
    position:absolute;
    top:50%;
    right:15px;
    transform:translateY(-50%);
    width:24px;
    height:24px;
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    color:#64748b;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
}

.eye-btn:hover{
    color:#2563eb;
}

.remember-me{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    color:#475569;
    margin:15px 0;
    cursor:pointer;
    user-select:none;
}

.remember-me input{
    width:16px;
    height:16px;
    margin:0;
    accent-color:#2563eb;
}
</style>
</head>

<body>

<div class="card">

    <div class="brand">

    <div class="brand-icon">
        <i class="fa-solid fa-link"></i>
    </div>

    <div class="brand-text">
        <h1>Earn<span>Shortlink</span></h1>
        <p>EarnShortlink - Monetize Your Links</p>
    </div>

</div>
    {% if error %}
    <div class="alert">
        {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">

        <input class="input" type="text" name="login" placeholder="Email / Username" required>

        <div class="password-box">
    <input
        type="password"
        name="password"
        id="password"
        class="input password-input"
        placeholder="Password"
        required
    >

    <button
        type="button"
        class="eye-btn"
        onclick="togglePassword()"
        aria-label="Show Password"
    >
        <i id="eyeIcon" class="fa-solid fa-eye"></i>
    </button>
</div>
<label class="remember-me">
    <input type="checkbox" name="remember_me">
    Tetap masuk
</label>

        <button class="btn">Masuk</button>

    </form>

    <a href="/auth/google" class="google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg">
        Login dengan Google
    </a>

    <div class="register">
        Belum punya akun?
        <a href="/register">Register sekarang</a>
    </div>

    <div class="footer">
        © 2026 EarnShortlink • All rights reserved
    </div>

</div>
<script>
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>
</body>
</html>
