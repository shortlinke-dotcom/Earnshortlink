<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg-dark:#020817;
--bg-light:#f1f5f9;
--card-dark:rgba(0,0,0,.45);
--card-light:rgba(255,255,255,.7);
--text-dark:#fff;
--text-light:#0f172a;
--primary:#2196f3;
}

/* AUTO MODE */
@media (prefers-color-scheme: light){
body{
background:var(--bg-light);
color:var(--text-light);
}
.login-card{
background:var(--card-light);
}
input{
background:rgba(0,0,0,.05);
color:#000;
}
}

@media (prefers-color-scheme: dark){
body{
background:var(--bg-dark);
color:var(--text-dark);
}
.login-card{
background:var(--card-dark);
}
}

/* BASE */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
transition:.3s;
}

/* BG */
.bg{
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),
url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564');
background-size:cover;
background-position:center;
z-index:-1;
}

/* SECTION */
.login-section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.login-card{
width:100%;
max-width:420px;
padding:35px;
border-radius:20px;
backdrop-filter:blur(18px);
border:1px solid rgba(33,150,243,.25);
box-shadow:0 0 50px rgba(33,150,243,.2);
transition:.3s;
}

/* HEADER */
.login-header{
text-align:center;
margin-bottom:25px;
}
.login-header h1{
font-size:34px;
font-weight:800;
letter-spacing:1px;
}
.login-header span{
color:var(--primary);
text-shadow:0 0 10px rgba(33,150,243,.6);
}

/* FORM */
.form-group{
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.15);
font-size:14px;
transition:.2s;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 15px rgba(33,150,243,.5);
outline:none;
}

/* BUTTON */
.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2196f3,#0ea5e9);
color:#fff;
font-weight:700;
font-size:15px;
cursor:pointer;
transition:.25s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(33,150,243,.7);
}

/* ALERT */
.alert{
background:#ef4444;
padding:12px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
font-size:14px;
}

/* DIVIDER */
.divider{
text-align:center;
margin:20px 0;
font-size:13px;
opacity:.7;
}

/* RESPONSIVE */
@media(max-width:768px){
.login-card{
max-width:100%;
min-height:100vh;
border-radius:0;
display:flex;
flex-direction:column;
justify-content:center;
}
}

</style>
</head>

<body>

<div class="bg"></div>

<section class="login-section">
<div class="login-card">

<div class="login-header">
<h1>EARN<span>SHORTLINK</span></h1>
</div>

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form action="/login" method="POST">
<div class="form-group">
<input type="text" name="login" placeholder="Email / Username" required>
</div>

<div class="form-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit" class="login-btn">
Masuk
</button>
</form>

<div class="divider">atau login dengan Google</div>

<!-- GOOGLE -->
<div id="g_id_onload"
     data-client_id="{{ GOOGLE_CLIENT_ID }}"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-size="large"
     data-theme="outline"
     data-text="signin_with">
</div>

</div>
</section>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
async function handleCredentialResponse(response) {
    const res = await fetch("/auth/google-session", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            credential: response.credential
        })
    });

    const data = await res.json();

    if (data.redirect) {
        window.location.href = data.redirect;
    } else {
        window.location.href = "/login?error=google_failed";
    }
}
</script>

</body>
</html>
