<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EarnShortlink</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020817;
--card:#0f172a;
--text:#fff;
--sub:#94a3b8;
--primary:#3b82f6;
}

@media (prefers-color-scheme: light){
:root{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--sub:#64748b;
}
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* CONTAINER */
.container{
width:100%;
max-width:380px;
text-align:center;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:800;
margin-bottom:10px;
}
.logo span{
color:var(--primary);
}

/* SUB */
.subtitle{
font-size:14px;
color:var(--sub);
margin-bottom:25px;
}

/* CARD */
.card{
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-bottom:12px;
background:rgba(255,255,255,.05);
color:var(--text);
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
margin-top:5px;
}

/* LOGIN */
.btn-primary{
background:var(--primary);
color:#fff;
}

/* GOOGLE */
.btn-google{
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:15px;
}

/* ALERT */
.alert{
background:#ef4444;
padding:10px;
border-radius:10px;
font-size:13px;
margin-bottom:15px;
}

/* DIVIDER */
.divider{
margin:15px 0;
font-size:13px;
color:var(--sub);
}

</style>
</head>

<body>

<div class="container">

<div class="logo">EARN<span>SHORTLINK</span></div>
<div class="subtitle">Login untuk melanjutkan</div>

<div class="card">

{% if error %}
<div class="alert">{{ error }}</div>
{% endif %}

<form action="/login" method="POST">
<input type="text" name="login" placeholder="Email / Username" required>
<input type="password" name="password" placeholder="Password" required>

<button class="btn btn-primary">
Masuk
</button>
</form>

<div class="divider">atau</div>

<a href="/auth/google" style="text-decoration:none;">
<button class="btn btn-google">
<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
Login dengan Google
</button>
</a>

</div>

</div>

</body>
</html>
