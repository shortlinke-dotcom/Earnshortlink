<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EarnShortlink</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#020617;
--card:rgba(15,23,42,0.6);
--text:#fff;
--sub:#94a3b8;
--primary:#3b82f6;
}
@media (prefers-color-scheme: light){
:root{
--bg:#f1f5f9;
--card:#ffffffcc;
--text:#0f172a;
--sub:#64748b;
}
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
/* BACKGROUND */
/* BACKGROUND */
body{
background: radial-gradient(circle at 20% 20%, #0a0f2c, #020617);
color:var(–text);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

/* GRID */
body::before{
content:””;
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
background-size:40px 40px;
animation:moveGrid 20s linear infinite;
}
@keyframes moveGrid{
from{transform:translate(0,0);}
to{transform:translate(-40px,-40px);}
}

/* PARTICLES */
.particles{
position:absolute;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(59,130,246,0.15) 1px, transparent 1px);
background-size:30px 30px;
animation:float 10s linear infinite;
opacity:.3;
}
@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-50px);}
}

/* CONTAINER */
.container{
width:100%;
max-width:380px;
text-align:center;
z-index:2;
}

/* ================= LOGO ANIMATION FIX ================= */

/* LOGO WRAP */
.logo-wrap{
position: relative;
overflow: hidden;
margin-bottom: 25px;
height: 60px;
}

/* TEXT TRACK */
.logo-track{
display: flex;
width: max-content;
gap: 80px;
animation: slideLoop 5s linear infinite;
}

/* TEXT */
.logo-text{
display: flex;
gap: 10px;
font-size: 34px;
font-weight: 900;
white-space: nowrap;
text-shadow:0 0 25px rgba(59,130,246,0.9);
animation: textFlicker 2s infinite;
}

/* WARNA */
.logo-text span:first-child{
color:#fff;
}
.logo-text span:last-child{
background: linear-gradient(90deg,#3b82f6,#00e0ff);
-webkit-background-clip: text;
color: transparent;
}

/* GERAK */
@keyframes slideLoop{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* FLICKER (KENA PETIR) */
@keyframes textFlicker{
0%,100%{opacity:1;}
45%{opacity:0.6;}
48%{opacity:1;}
50%{opacity:0.2;}
55%{opacity:1;}
}

/* SMOKE */
.smoke{
position:absolute;
width:200%;
height:100%;
background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
filter: blur(30px);
animation: slideLoop 5s linear infinite;
opacity:0.7;
}

/* LIGHTNING FLASH */
.lightning{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

/* PETIR NYAMBAR */
.lightning::before{
content:””;
position:absolute;
top:0;
left:50%;
width:2px;
height:100%;
background: linear-gradient(#fff,#3b82f6,transparent);
opacity:0;
filter: drop-shadow(0 0 15px #3b82f6);
animation: strike 2.5s infinite;
}

/* FLASH SCREEN */
.lightning::after{
content:””;
position:absolute;
inset:0;
background:rgba(255,255,255,0.15);
opacity:0;
animation: flash 2.5s infinite;
}

/* ANIMASI PETIR */
@keyframes strike{
0%,90%,100%{opacity:0;}
92%{opacity:1;}
94%{opacity:0.3;}
96%{opacity:1;}
}

/* FLASH */
@keyframes flash{
0%,90%,100%{opacity:0;}
92%{opacity:0.4;}
95%{opacity:0;}
}

/* ================= UI ================= */

.subtitle{
font-size:14px;
color:var(–sub);
margin-bottom:25px;
}

.card{
background:var(–card);
padding:25px;
border-radius:20px;
backdrop-filter:blur(20px);
border:1px solid rgba(59,130,246,0.2);
box-shadow:
0 0 40px rgba(59,130,246,0.15),
inset 0 0 20px rgba(255,255,255,0.05);
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(59,130,246,0.2);
margin-bottom:12px;
background:rgba(255,255,255,0.03);
color:var(–text);
transition:.3s;
}
input:focus{
outline:none;
border:1px solid #3b82f6;
box-shadow:0 0 10px rgba(59,130,246,0.5);
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
margin-top:5px;
transition:.3s;
}

.btn-primary{
background:linear-gradient(90deg,#3b82f6,#00d4ff);
color:#fff;
box-shadow:0 0 15px rgba(59,130,246,0.6);
}
.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(59,130,246,1);
}

.btn-google{
background:rgba(255,255,255,0.05);
color:#fff;
border:1px solid rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:15px;
}

.alert{
background:#ef4444;
padding:10px;
border-radius:10px;
font-size:13px;
margin-bottom:15px;
}

.divider{
margin:15px 0;
font-size:13px;
color:var(–sub);
}
</style>
</head>
<body>
<div class="particles"></div>
<div class="container">
<div class="logo-wrap">
    <div class="smoke"></div>
    <div class="lightning"></div>

    <div class="logo-track">
        <div class="logo-text">
            <span>EARN</span><span>SHORTLINK</span>
        </div>
        <div class="logo-text">
            <span>EARN</span><span>SHORTLINK</span>
        </div>
    </div>
</div>
<div class="subtitle">Login untuk melanjutkan</div>
<div class="card">

{% if error %}

<div class="alert">{{ error }}</div>
{% endif %}
<form action="/login" method="POST">
<input type="text" name="login" placeholder="Email / Username" required>
<input type="password" name="password" placeholder="Password" required>
<button class="btn btn-primary">
Masuk
</button>
</form>
<div class="divider">atau</div>
<a href="/auth/google" style="text-decoration:none;">
<button class="btn btn-google">
<img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
Login dengan Google
</button>
</a>
</div>
</div>
</body>
</html>
